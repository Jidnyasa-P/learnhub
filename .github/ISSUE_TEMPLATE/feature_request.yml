name: ✨ Feature Request
description: Propose a new feature or enhancement for LearnHub
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make LearnHub better? Let us know!
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: A clear and concise description of what the problem is. e.g. I'm frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: Any other ways to solve this problem.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
      placeholder: Any visual mockups, extra notes, or links.
    validations:
      required: false
  - type: checkboxes
    id: willing-to-work
    attributes:
      label: Contribution Willingness
      options:
        - label: I am willing to work on this feature myself and submit a pull request!
          required: false
