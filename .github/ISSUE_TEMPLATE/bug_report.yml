name: 🐛 Bug Report
description: Report a bug to help us improve LearnHub
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What goes wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Explain how we can reproduce this behavior step-by-step.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect to happen, and what actually happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Tell us about the environment in which you encountered the bug.
      placeholder: |
        - OS: (e.g. Windows 11, macOS Sequoia, Ubuntu 22.04)
        - Browser: (e.g. Chrome 120, Firefox 121, Safari)
        - Node.js Version: (e.g. v18.19.0)
        - Database version: (e.g. MongoDB v7.0)
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this issue to the functionality of the application?
      options:
        - Low (minor visual bug or typo)
        - Medium (functional bug with a workaround)
        - High (functional bug with no workaround)
        - Critical (app crashes, security issues, or blockages)
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: Drag and drop screenshots or paste links to recordings here, if applicable.
      placeholder: Attach screenshots or gifs here.
    validations:
      required: false
